# 意图映射配置文件
# 定义所有命令的自然语言触发规则
# 版本: 3.0.0

version: "3.0"

commands:
  - id: spec-init
    priority: 90
    triggers: [初始化, 建立项目, 创建项目, 新建项目, 迁移项目]
    patterns: ["初始化(这个)?项目", "在(.*)初始化", "建立(.*)项目"]

  - id: spec-import
    priority: 85
    triggers: [导入, 迁移, 引入, 添加项目, 增量同步]
    patterns: ["导入(.*)项目", "从(.*)导入", "迁移(.*)项目"]

  - id: spec-iteration-create
    priority: 80
    triggers: [创建期次, 新建期次, 开启期次]
    patterns: ["创建(.*)期次", "新建(.*)期次"]

  - id: spec-iteration-split
    priority: 80
    triggers: [拆分需求, 分解需求, 拆分文档]
    patterns: ["拆分(.*)需求", "分解(.*)需求"]

  - id: spec-new-task
    priority: 85
    triggers: [创建一个, 新增一个, 做一个, 开发一个, 实现]
    patterns: ["创建(.*)任务", "新增(.*)任务", "做一个(.*)", "开发(.*)"]

  - id: spec-goal
    priority: 80
    triggers: [完成需求, 实现功能, 交付功能]
    patterns: ["完成(.*)需求", "实现(.*)功能"]

  - id: spec-plan
    priority: 75
    triggers: [方案, 计划, 怎么做, 怎么实现, 评估]
    patterns: ["(.*)怎么做", "(.*)怎么实现"]

  - id: spec-bugfix
    priority: 85
    triggers: [修复, 解决, bug, 问题, 报错]
    patterns: ["修复(.*)问题", "修复(.*)bug"]

  - id: spec-research
    priority: 80
    triggers: [调研, 评估, 选型, 对比]
    patterns: ["调研(.*)方案", "调研(.*)技术"]

  - id: spec-execute
    priority: 90
    triggers: [开始, 执行, 干活, 继续, 开发, 做, 跑]
    patterns: ["开始(.*)", "继续(.*)", "开发(.*)", "执行(.*)"]

  - id: spec-change
    priority: 100
    triggers: [改成, 改为, 调整, 修改, 更新, 变更, 升级, 换成]
    patterns: ["把(.*)改成(.*)", "将(.*)调整为(.*)", "修改(.*)"]

  - id: spec-sync
    priority: 70
    triggers: [同步, 反向同步, 更新Spec, 对齐]
    patterns: ["同步(.*)", "更新(.*)Spec"]

  - id: spec-review
    priority: 80
    triggers: [审查, 检查, review, 查看, 核对]
    patterns: ["审查(.*)", "检查(.*)", "review(.*)"]

  - id: spec-validate
    priority: 75
    triggers: [合规, 校验, 检查规范]
    patterns: ["合规检查", "校验(.*)"]

  - id: spec-progress
    priority: 70
    triggers: [进度, 进展, 完成, 还差]
    patterns: ["进度", "进展"]

  - id: spec-status
    priority: 70
    triggers: [状态, 情况, 怎么样了]
    patterns: ["状态", "情况"]

  - id: spec-archive
    priority: 75
    triggers: [归档, 存档, 清理, 整理]
    patterns: ["归档", "清理"]

  - id: spec-handover
    priority: 65
    triggers: [交接, 转交, 移交, 交付]
    patterns: ["交接", "转交", "生成交接文档"]

  - id: spec-retro
    priority: 60
    triggers: [回顾, 总结, 复盘, 反思]
    patterns: ["回顾(.*)", "总结(.*)"]

  - id: spec-health
    priority: 65
    triggers: [健康, 质量, 评分]
    patterns: ["健康度", "质量"]

  - id: spec-report
    priority: 65
    triggers: [报告, 汇报, 生成报告]
    patterns: ["生成报告", "汇报"]

  - id: spec-config
    priority: 60
    triggers: [配置, 设置]
    patterns: ["配置", "设置"]

  - id: spec-help
    priority: 50
    triggers: [帮助, 怎么用, 教程, 不会用]
    patterns: ["帮助", "怎么用", "教程"]

  - id: spec-demo
    priority: 45
    triggers: [示例, 体验, 试一下, demo]
    patterns: ["示例", "体验", "demo"]

  - id: spec-welcome
    priority: 40
    triggers: [引导, 教程, 第一次, 新手, 入门]
    patterns: ["引导", "第一次使用", "新手入门"]

  - id: spec-template-add
    priority: 55
    triggers: [添加模板, 新增模板, 保存模板]
    patterns: ["添加模板", "新增模板", "保存(.*)模板"]

  - id: spec-iteration-from-global
    priority: 80
    triggers: [从全量生成, 基于全局创建, 选择需求生成期次]
    patterns: ["从全量(.*)生成期次", "基于全局(.*)创建期次"]

  - id: spec-sync-global
    priority: 70
    triggers: [同步全量, 同步全局, 更新全量层]
    patterns: ["同步(.*)到全量层", "更新全量层"]

  - id: spec-global-status
    priority: 65
    triggers: [全量状态, 全局状态, 全量层]
    patterns: ["全量状态", "全局状态", "查看全量层"]

  - id: spec-history
    priority: 55
    triggers: [历史, 变更记录, 谁改的, 什么时候]
    patterns: ["查看(.*)历史", "(.*)变更记录", "谁改了(.*)"]

  - id: spec-impact
    priority: 75
    triggers: [影响, 依赖, 波及, 影响分析]
    patterns: ["(.*)影响(.*)", "变更(.*)影响", "(.*)会影响谁"]

  - id: spec-dashboard
    priority: 50
    triggers: [仪表盘, 看板, 可视化, 总览图]
    patterns: ["仪表盘", "看板", "可视化"]

  - id: spec-baseline
    priority: 50
    triggers: [基线, 快照, 回滚]
    patterns: ["创建基线", "打快照", "回滚"]

  - id: spec-ai-audit
    priority: 45
    triggers: [审计, 扫描, 检查, 重复, 歧义]
    patterns: ["智能审计", "扫描全量层", "检查重复需求"]

  - id: spec-rename
    priority: 70
    triggers: [重命名, 改名, 修改名称, 更名]
    patterns: ["把(.*)改成(.*)", "重命名(.*)为(.*)", "将(.*)更名为(.*)"]

  - id: spec-platform-add
    priority: 55
    triggers: [添加平台, 新增端, 添加前端类型]
    patterns: ["添加(.*)平台", "新增(.*)端"]

  - id: spec-index-update
    priority: 50
    triggers: [更新索引, 重建索引, 刷新索引]
    patterns: ["更新索引", "重建索引", "刷新索引"]

  - id: spec-context
    priority: 45
    triggers: [上下文, 环境, 加载状态, 依赖链]
    patterns: ["查看上下文", "加载.*状态", "查看.*依赖"]

  - id: spec-context
    priority: 45
    triggers: [上下文, 环境, 加载状态, 依赖链]
    patterns: ["查看上下文", "加载.*状态", "查看.*依赖"]
