# 上下文配置文件
# 用于智能默认值填充

defaults:
  iteration: "auto"
  assignee: "git"
  task: "last"
  platform: "all"

auto_detection:
  iteration:
    source: ".speccore/ITERATIONS/README.md"
    status_field: "状态"
    active_status: "🔄 进行中"
  
  assignee:
    source: "git config user.name"
    fallback: "未指定"
  
  requirement:
    priority:
      - "REQUIREMENT.md"
      - "PRD.md"
      - "docs/REQUIREMENT.md"
      - "docs/PRD.md"
  
  code_paths:
    priority:
      - "."
      - "src/"
      - "backend/"
      - "frontend/"

  platforms:
    source: ".speccore/config/platforms.yaml"
    all_keyword: "all"

task_matching:
  exact: "匹配完整编号 (Task-001)"
  shorthand: "匹配简写 (task1, T001, #1)"
  name_contains: "名称中包含关键词"
  pinyin: "名称拼音首字母"
