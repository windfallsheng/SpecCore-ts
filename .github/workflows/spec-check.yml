name: Spec Compliance Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

jobs:
  spec-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check @spec Annotations
        id: check-spec
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E '\.(java|kt|ts|js|vue|go|py)$' || true)
          else
            FILES=$(git diff --name-only HEAD~1..HEAD | grep -E '\.(java|kt|ts|js|vue|go|py)$' || true)
          fi

          MISSING=""
          for f in $FILES; do
            if ! grep -q "@spec" "$f" 2>/dev/null; then
              MISSING="$MISSING$f"$'\n'
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
            echo "missing_files<<EOF" >> $GITHUB_OUTPUT
            echo "$MISSING" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "missing=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Report
        run: |
          echo "## 📊 Spec 合规性检查" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-spec.outputs.missing }}" == "true" ]; then
            echo "⚠️ **警告**：以下文件缺少 \`@spec\` 注释（不阻断合并）：" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.check-spec.outputs.missing_files }}" | while read f; do
              [ -n "$f" ] && echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "💡 建议在文件头部添加 \`@spec\` 注释。" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ 所有代码文件都包含 \`@spec\` 注释。" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*报告由 SpecCore 自动生成*" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const missing = `${{ steps.check-spec.outputs.missing_files }}`;
            let body = '## 📊 Spec 合规性检查\n\n';
            if (missing && missing.trim()) {
              body += '⚠️ **警告**：以下文件缺少 `@spec` 注释（不阻断合并）：\n\n';
              missing.trim().split('\n').forEach(f => {
                if (f) body += `- \`${f}\`\n`;
              });
              body += '\n💡 建议在文件头部添加 `@spec` 注释。\n';
            } else {
              body += '✅ 所有代码文件都包含 `@spec` 注释。\n';
            }
            body += '\n---\n*报告由 SpecCore 自动生成*';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
